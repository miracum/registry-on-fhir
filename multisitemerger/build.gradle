plugins {
    id "org.springframework.boot" version "2.4.2"
    id "io.spring.dependency-management" version "1.0.11.RELEASE"
    id "java"
    id "jacoco"
    id "checkstyle"
    id "com.diffplug.spotless" version "5.10.2"

}

group = "org.miracum.registry"
version = "0.0.1-SNAPSHOT"
sourceCompatibility = "11"

configurations {
    developmentOnly
    runtimeClasspath {
        extendsFrom developmentOnly
    }
}

repositories {
    mavenCentral()
    maven { url "https://repo.spring.io/milestone" }
}

dependencies {
    implementation "org.springframework.boot:spring-boot-starter-actuator"
    implementation "org.springframework.boot:spring-boot-starter-web"
    implementation "org.springframework.retry:spring-retry:1.3.1"
    implementation "org.jgrapht:jgrapht-core:1.5.0"
    implementation "org.jgrapht:jgrapht-io:1.5.0"
    implementation "ca.uhn.hapi.fhir:hapi-fhir-base:5.2.1"
    implementation "ca.uhn.hapi.fhir:hapi-fhir-client:5.2.1"
    implementation "ca.uhn.hapi.fhir:hapi-fhir-structures-r4:5.2.1"

    implementation "io.micrometer:micrometer-registry-prometheus:1.6.3"
    implementation "io.micrometer:micrometer-core:1.6.3"

    developmentOnly "org.springframework.boot:spring-boot-devtools"
    testImplementation("org.springframework.boot:spring-boot-starter-test") {
        exclude group: "org.junit.vintage", module: "junit-vintage-engine"
    }
    testImplementation "org.junit.jupiter:junit-jupiter-params:5.7.1"

    annotationProcessor "org.springframework.boot:spring-boot-configuration-processor"
}

test {
    useJUnitPlatform()
}

jacoco {
    toolVersion = "0.8.5"
    reportsDir = file("$buildDir/jacoco-reports")
}

jacocoTestReport {
    reports {
        xml.enabled true
        csv.enabled true
        csv.destination file("${buildDir}/jacoco/coverage.csv")
        html.destination file("${buildDir}/jacoco/html")
    }
}

spotless {
    java {
        importOrder()
        removeUnusedImports()
        googleJavaFormat()
    }
}

checkstyle {
    toolVersion "8.39"
    configFile = file(".checkstyle/checkstyle.xml")
}
